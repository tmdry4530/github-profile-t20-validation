name: Update GitHub profile

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: github-profile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: 프로필 갱신
        uses: tmdry4530/github-profile@2b428c538d153809034231c8b7d6522c86d2f79b # github-profile action v0.0.0
        with:
          github-token: ${{ github.token }}
          config-path: github-profile.config.json
          default-branch: ${{ github.event.repository.default_branch }}
